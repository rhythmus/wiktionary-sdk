# JSON Schema $defs fragment — see tools/schema-def-modules.ts

schemaVersion:
  type: string
  description: >-
    Semantic version of this output schema. Bump MAJOR for breaking shape changes, MINOR for additive fields, PATCH for
    documentation-only corrections.
  examples:
    - 3.3.0
    - 3.2.0
    - 3.0.0
WikiLang:
  type: string
  description: BCP-47-style language code.
  examples:
    - el
    - grc
    - en
    - nl
    - de
    - fr
LexemeType:
  type: string
  enum:
    - LEXEME
    - INFLECTED_FORM
    - FORM_OF
  description: Discriminator for the kind of lexeme.
LexicographicFamily:
  type: string
  description: Taxonomic bucket for the lexeme-class section (see `src/lexicographic-headings.ts`).
  enum:
    - pos
    - morpheme
    - symbol
    - character
    - phraseology
    - numeral_kind
    - other
    - disallowed_attested
LexicographicSectionSlug:
  type: string
  description: >-
    Known `section_slug` values from `src/lexicographic-headings.ts`. `Lexeme.lexicographic_section` may also be any
    other string when `fallbackLexicographicFromHeading` derives a slug from an unregistered heading.
  enum:
    - abbreviation
    - acronym
    - adjective
    - adposition
    - adverb
    - affix
    - ambiposition
    - article
    - cardinal_numeral
    - cardinal_number
    - character
    - circumfix
    - circumposition
    - classifier
    - clitic
    - combining_form
    - conjunction
    - contraction
    - counter
    - determinative
    - determiner
    - diacritical_mark
    - gerund
    - han_character
    - hanja
    - hanzi
    - idiom
    - ideophone
    - infix
    - initialism
    - interfix
    - interjection
    - kanji
    - letter
    - ligature
    - logogram
    - noun
    - numeral
    - number
    - ordinal_numeral
    - ordinal_number
    - particle
    - participle
    - phrase
    - phrasebook
    - postposition
    - preposition
    - prepositional_phrase
    - prefix
    - pronoun
    - proper_noun
    - proverb
    - punctuation_mark
    - root
    - romanization
    - suffix
    - syllable
    - symbol
    - verb

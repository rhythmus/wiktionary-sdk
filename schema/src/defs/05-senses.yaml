# JSON Schema $defs fragment — see tools/schema-def-modules.ts

Example:
  type: object
  properties:
    text:
      type: string
    translation:
      type: string
    transliteration:
      type: string
    author:
      type: string
    year:
      type: string
    source:
      type: string
    raw:
      type: string
  required:
    - text
AlternativeForm:
  type: object
  required:
    - term
    - raw
  properties:
    term:
      type: string
    qualifier:
      type: string
      description: Optional label, e.g. 'colloquial', 'archaic'.
    raw:
      type: string
      description: Verbatim wikitext line.
    type:
      type: string
      description: Variant kind when decoded, e.g. 'polytonic', 'archaic'.
    labels:
      type: array
      items:
        type: string
      description: Register/style labels for the variant, e.g. ['rare', 'poetic'].
  additionalProperties: false
OnlyUsedIn:
  type: object
  required:
    - lang
    - terms
    - raw
  properties:
    lang:
      type: string
      description: Language code of the linked expression(s)
    terms:
      type: array
      items:
        type: string
      description: Fixed expression(s) from |2= (comma-separated in wikitext)
    t_gloss:
      type: string
      description: Optional gloss from |t= / |4=
    raw:
      type: string
      description: Verbatim {{only used in|…}} template
  additionalProperties: false
Sense:
  type: object
  required:
    - id
    - gloss
  properties:
    id:
      type: string
      description: Unique sense ID, e.g. 'S1', 'S1.1'
    gloss:
      type: string
    gloss_raw:
      type: string
      description: 'Exact text after #/## before stripping'
    only_used_in:
      $ref: '#/$defs/OnlyUsedIn'
    qualifier:
      type: string
      description: Parenthetical qualifier after the main gloss, e.g. 'for traffic violations'.
    labels:
      type: array
      items:
        type: string
      description: Register/style labels from {{lb}}, e.g. ['colloquial', 'figurative'].
    topics:
      type: array
      items:
        type: string
      description: Topic domains from {{lb}}, e.g. ['law', 'computing'].
    examples:
      type: array
      items:
        anyOf:
          - type: string
          - $ref: '#/$defs/Example'
    subsenses:
      type: array
      items:
        $ref: '#/$defs/Sense'
  additionalProperties: false

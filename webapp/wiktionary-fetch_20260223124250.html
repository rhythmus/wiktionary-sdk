<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Wiktionary Fetch Demo</title>

<style>
:root{
 --bg:#0b0f17;
 --panel:#101827;
 --panel2:#0f172a;
 --text:#e6eaf2;
 --muted:#9aa7bd;
 --line:#22304a;
 --accent:#6ee7ff;
 --ok:#73ff9a;
 --danger:#ff6b6b;
}

*{box-sizing:border-box}
body{
 margin:0;
 background:var(--bg);
 color:var(--text);
 font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
}

header{
 padding:16px;
 border-bottom:1px solid var(--line);
}

input[type=text]{
 width:60%;
 padding:10px;
 border-radius:8px;
 border:1px solid var(--line);
 background:var(--panel);
 color:var(--text);
}

button{
 padding:10px 14px;
 margin-left:8px;
 border-radius:8px;
 border:1px solid var(--line);
 background:#1f2937;
 color:var(--text);
 cursor:pointer;
}

main{
 display:flex;
 height:calc(100vh - 80px);
}

.pane{
 flex:1;
 overflow:auto;
 padding:12px;
 border-right:1px solid var(--line);
}

.pane:last-child{
 border-right:none;
}

pre{
 background:#0d1422;
 padding:12px;
 border-radius:8px;
 font-size:12px;
 line-height:1.3;
 overflow:auto;
}

/* YAML highlighting */
pre.yaml{
 font-family:ui-monospace,Menlo,Consolas,monospace;
}

.yaml-key{color:#7dd3fc;font-weight:600;}
.yaml-string{color:#86efac;}
.yaml-number{color:#fbbf24;}
.yaml-bool{color:#f472b6;}
.yaml-dash{color:#94a3b8;}
</style>
</head>

<body>

<header>
<input id="q" type="text" placeholder="Try: έγραψε, έγραψα, γράφω, σπίτι" />
<button onclick="run()">Search</button>
</header>

<main>
<div class="pane">
<h3>Raw Wiktionary Wikitext</h3>
<pre id="raw">—</pre>
</div>

<div class="pane">
<h3>Normalized YAML</h3>
<pre id="yaml" class="yaml">—</pre>
</div>
</main>

<script>

const API = "https://en.wiktionary.org/w/api.php";

async function fetchWikitext(title){
 const u = new URL(API);
 u.searchParams.set("action","parse");
 u.searchParams.set("page",title);
 u.searchParams.set("prop","wikitext");
 u.searchParams.set("format","json");
 u.searchParams.set("formatversion","2");
 u.searchParams.set("origin","*");
 const r = await fetch(u);
 const j = await r.json();
 return j.parse?.wikitext || "";
}

function yamlDump(value, indent=0){
 const sp = " ".repeat(indent);
 const next = indent + 1;

 if(value===null||value===undefined) return "null";
 if(typeof value==="number"||typeof value==="boolean") return String(value);

 if(typeof value==="string"){
  if(!value.length) return '""';
  if(/^[a-zA-Z0-9_\-]+$/.test(value)) return value;
  return JSON.stringify(value);
 }

 if(Array.isArray(value)){
  if(!value.length) return "[]";
  if(value.length<=4 && value.every(isScalar)){
   return `[${value.map(v=>yamlDump(v)).join(", ")}]`;
  }
  return value.map(v=>{
   if(isScalar(v)) return `${sp}- ${yamlDump(v)}`;
   return `${sp}-\n${yamlDump(v,next)}`;
  }).join("\n");
 }

 if(typeof value==="object"){
  const keys=Object.keys(value).filter(k=>value[k]!==undefined);
  if(!keys.length) return "{}";
  if(keys.length<=4 && keys.every(k=>isScalar(value[k]))){
   return `{ ${keys.map(k=>`${k}: ${yamlDump(value[k])}`).join(", ")} }`;
  }
  return keys.map(k=>{
   const v=value[k];
   if(isScalar(v)) return `${sp}${k}: ${yamlDump(v)}`;
   return `${sp}${k}:\n${yamlDump(v,next)}`;
  }).join("\n");
 }

 return JSON.stringify(value);
}

function isScalar(v){
 return v===null || typeof v==="string" || typeof v==="number" || typeof v==="boolean";
}

function highlightYaml(yaml){
 return yaml
  .replace(/^(\s*)(- )/gm,'$1<span class="yaml-dash">-</span> ')
  .replace(/^(\s*)([a-zA-Z0-9_]+):/gm,'$1<span class="yaml-key">$2</span>:')
  .replace(/"([^"]*)"/g,'"<span class="yaml-string">$1</span>"')
  .replace(/(true|false|null)/g,'<span class="yaml-bool">$1</span>')
  .replace(/\d+(\.\d+)?/g,'<span class="yaml-number">$&</span>');
}

async function run(){
 const term=document.getElementById("q").value.trim();
 if(!term) return;

 document.getElementById("raw").textContent="Loading...";
 document.getElementById("yaml").innerHTML="Loading...";

 try{
  const wt = await fetchWikitext(term);
  document.getElementById("raw").textContent = wt;

  const structured = {
   query: term,
   length: wt.length,
   preview: wt.slice(0,300)
  };

  const yaml = yamlDump(structured);
  document.getElementById("yaml").innerHTML = highlightYaml(yaml);

 }catch(e){
  document.getElementById("raw").textContent = e.toString();
  document.getElementById("yaml").textContent = e.toString();
 }
}

document.getElementById("q").value="έγραψε";
run();

</script>

</body>
</html>

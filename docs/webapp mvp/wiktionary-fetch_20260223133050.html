<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>WiktionaryFetch Demo (Wikitext → Templates → Normalized YAML)</title>
<style>
  :root { --bg:#0b0d12; --panel:#111626; --panel2:#0f1320; --text:#e8ecf3; --muted:#a9b3c7; --border:#26324f; --accent:#7aa2ff; }
  *{box-sizing:border-box}
  body{margin:0; background:var(--bg); color:var(--text); font:14px/1.35 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;}
  header{padding:14px 16px; border-bottom:1px solid var(--border); background:linear-gradient(180deg, rgba(17,22,38,.9), rgba(11,13,18,.9)); position:sticky; top:0; z-index:10}
  .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center}
  label{color:var(--muted); font-size:12px}
  input, select, button{background:var(--panel); color:var(--text); border:1px solid var(--border); border-radius:10px; padding:10px 12px; outline:none}
  input{min-width:280px; flex:1}
  button{cursor:pointer}
  button:hover{border-color:#3a4f7e}
  .chip{display:inline-flex; align-items:center; gap:8px; padding:8px 10px; border-radius:999px; border:1px solid var(--border); background:var(--panel2)}
  .chip input{min-width:auto; padding:0; border:none}
  main{display:grid; grid-template-columns: 1fr 1fr; gap:12px; padding:12px 12px 18px}
  @media (max-width: 980px){ main{grid-template-columns:1fr} }
  .pane{border:1px solid var(--border); border-radius:14px; overflow:hidden; background:var(--panel2); box-shadow: 0 10px 30px rgba(0,0,0,.25)}
  .pane h2{margin:0; padding:10px 12px; font-size:13px; color:var(--muted); border-bottom:1px solid var(--border); background:rgba(17,22,38,.7)}
  pre{margin:0; padding:12px; overflow:auto; max-height: calc(100vh - 170px); white-space:pre-wrap; word-break:break-word}
  .status{padding:10px 12px; color:var(--muted); border-top:1px solid var(--border)}
  .grid2{display:grid; grid-template-columns: 1fr 1fr; gap:10px}
  .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;}
  /* Minimal YAML-ish highlighting */
  .yaml .k{color:#9cdcfe}
  .yaml .s{color:#ce9178}
  .yaml .n{color:#b5cea8}
  .yaml .p{color:#d4d4d4}
  .yaml .t{color:#c586c0}
  .yaml .c{color:#6a9955}
  .imgstrip{display:flex; gap:10px; padding:10px 12px; border-top:1px solid var(--border); flex-wrap:wrap}
  .imgcard{border:1px solid var(--border); border-radius:12px; overflow:hidden; background:var(--panel); max-width:220px}
  .imgcard img{display:block; width:220px; height:auto}
  .imgcard .cap{padding:8px 10px; color:var(--muted); font-size:12px}
</style>
</head>
<body>
<header>
  <div class="row">
    <div style="display:flex;flex-direction:column;gap:6px;flex:1;min-width:320px">
      <label for="q">Query term</label>
      <input id="q" placeholder='e.g. γράφω, έγραψα, σπίτια, ο άνθρωπος' value="γράφω"/>
    </div>

    <div style="display:flex;flex-direction:column;gap:6px;min-width:140px">
      <label for="lang">Language</label>
      <select id="lang">
        <option value="el" selected>el (Greek)</option>
        <option value="grc">grc (Ancient Greek)</option>
        <option value="en">en (English)</option>
        <option value="nl">nl (Dutch)</option>
        <option value="de">de (German)</option>
        <option value="fr">fr (French)</option>
      </select>
    </div>

    <div style="display:flex;flex-direction:column;gap:6px;min-width:190px">
      <label for="prefpos">Preferred lemma PoS</label>
      <select id="prefpos">
        <option value="">(auto)</option>
        <option value="verb" selected>verb</option>
        <option value="noun">noun</option>
        <option value="adjective">adjective</option>
        <option value="pronoun">pronoun</option>
        <option value="numeral">numeral</option>
        <option value="adverb">adverb</option>
      </select>
    </div>

    <div class="chip">
      <input id="enrich" type="checkbox" checked/>
      <label for="enrich" style="margin:0">Wikidata enrich lemma</label>
    </div>

    <button id="go">Fetch</button>
  </div>
</header>

<main>
  <section class="pane">
    <h2>Left: Raw Wiktionary Wikitext (language section only)</h2>
    <pre id="raw" class="mono"></pre>
    <div class="status" id="statusLeft"></div>
  </section>

  <section class="pane">
    <h2>Right: Normalized YAML (source-faithful; no heuristics)</h2>
    <pre id="yaml" class="mono yaml"></pre>
    <div id="imgs" class="imgstrip" style="display:none"></div>
    <div class="status" id="statusRight"></div>
  </section>
</main>

<script>
/**
 * WiktionaryFetch Demo
 * Scope: Extract only data explicitly present in Wiktionary/Wikidata/Wikimedia.
 * No morphological inference / no paradigm generation / no heuristic stem guessing.
 */

/** -------------------- Utilities -------------------- **/

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

function escapeHtml(s){
  return (s ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");
}

function urlEncodeTitle(title){
  // MediaWiki titles are UTF-8; encodeURIComponent is fine.
  return encodeURIComponent(title);
}

function uniq(arr){
  return Array.from(new Set(arr));
}

/** -------------------- MediaWiki API -------------------- **/

async function mwFetchJson(origin, params){
  const u = new URL(origin);
  for(const [k,v] of Object.entries(params)) u.searchParams.set(k, v);
  const res = await fetch(u.toString(), { headers: { "accept": "application/json" }});
  if(!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}`);
  return await res.json();
}

async function fetchWikitextEnWiktionary(title){
  // We use en.wiktionary.org consistently for parsing (your chosen strategy).
  const origin = "https://en.wiktionary.org/w/api.php";
  const j = await mwFetchJson(origin, {
    action: "query",
    format: "json",
    formatversion: "2",
    origin: "*",
    prop: "revisions|pageprops",
    rvprop: "content",
    rvslots: "main",
    redirects: "1",
    titles: title
  });
  const page = j?.query?.pages?.[0];
  const wikitext = page?.revisions?.[0]?.slots?.main?.content ?? "";
  const pageprops = page?.pageprops ?? {};
  const exists = !page?.missing;
  const normalizedTitle = page?.title ?? title;
  return { exists, title: normalizedTitle, wikitext, pageprops, pageid: page?.pageid ?? null };
}

async function fetchWikidataEntity(qid){
  const origin = "https://www.wikidata.org/w/api.php";
  const j = await mwFetchJson(origin, {
    action: "wbgetentities",
    format: "json",
    formatversion: "2",
    origin: "*",
    ids: qid,
    props: "labels|descriptions|claims|sitelinks"
  });
  const ent = j?.entities?.[qid];
  return ent ?? null;
}

/** -------------------- Wikitext Sectioning -------------------- **/

function extractLanguageSection(wikitext, languageName){
  // Language sections are level-2 headers: ==Greek==, ==Ancient Greek==, etc.
  const re = new RegExp(`^==\\s*${escapeRegExp(languageName)}\\s*==\\s*$`, "m");
  const m = re.exec(wikitext);
  if(!m) return null;
  const start = m.index + m[0].length;
  const after = wikitext.slice(start);
  const next = after.search(/^==[^=].*==\s*$/m);
  const block = next === -1 ? after : after.slice(0, next);
  return `==${languageName}==` + block;
}

function escapeRegExp(s){ return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }

function splitEtymologiesAndPOS(langBlock){
  // Returns structured blocks: { etymologyIndex, etymologyTitle, posBlocks:[{posHeading, wikitext}] }
  // We keep Wikitext intact; decoding happens from templates/lines inside blocks.
  const lines = langBlock.split("\n");
  let currentEtym = { idx: 0, title: "Etymology", posBlocks: [] };
  let currentPOS = null;

  function flushPOS(){
    if(currentPOS){
      currentEtym.posBlocks.push(currentPOS);
      currentPOS = null;
    }
  }
  function flushEtym(){
    flushPOS();
    if(currentEtym.posBlocks.length>0) etyms.push(currentEtym);
  }

  const etyms = [];
  for(let i=0;i<lines.length;i++){
    const line = lines[i];
    const mE = line.match(/^===\s*Etymology(?:\s+(\d+))?\s*===\s*$/);
    const mPOS = line.match(/^===\s*([^=]+?)\s*===\s*$/); // PoS headings are level-3 inside language section (common on en.wiktionary)
    if(mE){
      flushEtym();
      const n = mE[1] ? parseInt(mE[1],10) : (currentEtym.idx+1);
      currentEtym = { idx: n, title: `Etymology${mE[1] ? " "+mE[1] : ""}`, posBlocks: [] };
      continue;
    }
    if(mPOS && !mE){
      // Heuristic avoided? This is structural: a level-3 header, we treat it as potential PoS.
      flushPOS();
      currentPOS = { posHeading: mPOS[1].trim(), lines: [] };
      continue;
    }
    if(currentPOS) currentPOS.lines.push(line);
  }
  flushEtym();
  if(etyms.length===0){
    // No explicit etymology/pos splits; treat as single block.
    return [{ idx: 0, title: "Etymology", posBlocks: [{ posHeading: "(unknown)", lines: lines.slice(1) }] }];
  }
  // Convert line arrays to wikitext blocks
  for(const e of etyms){
    for(const pb of e.posBlocks){
      pb.wikitext = pb.lines.join("\n");
      delete pb.lines;
    }
  }
  return etyms;
}

/** -------------------- Template Parsing (minimal, brace-safe) -------------------- **/

function parseTemplates(wikitext){
  // Finds top-level {{...}} templates (no recursion expansion).
  // Returns list of {name, raw, params:{positional:[], named:{}} }
  const out = [];
  let i = 0;
  while(i < wikitext.length){
    const start = wikitext.indexOf("{{", i);
    if(start === -1) break;
    let depth = 0;
    let j = start;
    for(; j < wikitext.length; j++){
      if(wikitext.startsWith("{{", j)){ depth++; j++; continue; }
      if(wikitext.startsWith("}}", j)){ depth--; j++; if(depth===0){ j++; break; } continue; }
    }
    if(depth !== 0){ i = start + 2; continue; }
    const raw = wikitext.slice(start, j);
    const inner = raw.slice(2, -2);
    const tpl = parseTemplateInner(inner);
    if(tpl) out.push({ ...tpl, raw });
    i = j;
  }
  return out;
}

function splitPipesPreservingLinks(s){
  // naive pipe split; good enough for template params; doesn't split inside [[...|...]].
  const parts = [];
  let cur = "";
  let depthLink = 0;
  for(let i=0;i<s.length;i++){
    const ch = s[i];
    const next2 = s.slice(i,i+2);
    if(next2 === "[["){ depthLink++; cur += next2; i++; continue; }
    if(next2 === "]]" && depthLink>0){ depthLink--; cur += next2; i++; continue; }
    if(ch === "|" && depthLink===0){
      parts.push(cur);
      cur = "";
      continue;
    }
    cur += ch;
  }
  parts.push(cur);
  return parts;
}

function parseTemplateInner(inner){
  const parts = splitPipesPreservingLinks(inner);
  const name = (parts[0] ?? "").trim();
  if(!name) return null;
  const positional = [];
  const named = {};
  for(let k=1;k<parts.length;k++){
    const p = parts[k];
    const eq = p.indexOf("=");
    if(eq !== -1){
      const key = p.slice(0,eq).trim();
      const val = p.slice(eq+1).trim();
      if(key) named[key] = val;
      else positional.push(p.trim());
    } else {
      positional.push(p.trim());
    }
  }
  return { name, params: { positional, named } };
}

/** -------------------- Normalized Schema (source-faithful) -------------------- **/

function makeBaseEntry({query, lang, wiktTitle, etymIdx, posHeading, entryType}){
  const id = `${lang}:${wiktTitle}#E${etymIdx}#${slug(posHeading)}#${entryType}`;
  return {
    entry: {
      id,
      language: lang,
      query,
      type: entryType, // LEXEME | INFLECTED_FORM | FORM_OF | ...
      form: wiktTitle,
      etymology_index: etymIdx,
      part_of_speech_heading: posHeading,
      source: {
        wiktionary: {
          site: "en.wiktionary.org",
          title: wiktTitle,
          language_section: langToLanguageName(lang),
          etymology_index: etymIdx,
          pos_heading: posHeading
        }
      }
    }
  };
}

function slug(s){
  return (s ?? "unknown").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"");
}

function langToLanguageName(lang){
  if(lang==="el") return "Greek";
  if(lang==="grc") return "Ancient Greek";
  if(lang==="en") return "English";
  if(lang==="nl") return "Dutch";
  if(lang==="de") return "German";
  if(lang==="fr") return "French";
  return "Greek";
}

/** -------------------- Decoder Registry -------------------- **/

class DecoderRegistry{
  constructor(){ this.decoders = []; }
  register(decoder){ this.decoders.push(decoder); }
  decodeAll(ctx){
    const patches = [];
    for(const d of this.decoders){
      if(d.matches(ctx)) patches.push(d.decode(ctx));
    }
    return mergePatches(patches);
  }
}

function mergePatches(patches){
  const out = {};
  for(const p of patches){
    deepMerge(out, p);
  }
  return out;
}

function deepMerge(dst, src){
  if(!src || typeof src !== "object") return;
  for(const [k,v] of Object.entries(src)){
    if(v && typeof v === "object" && !Array.isArray(v)){
      if(!dst[k] || typeof dst[k] !== "object" || Array.isArray(dst[k])) dst[k] = {};
      deepMerge(dst[k], v);
    } else {
      dst[k] = v;
    }
  }
}

function ensurePath(obj, path){
  let cur=obj;
  for(const p of path){
    if(!(p in cur)) cur[p] = {};
    cur = cur[p];
  }
  return cur;
}

const registry = new DecoderRegistry();

/** --- Core: store raw template calls (always) --- **/
registry.register({
  id: "store-raw-templates",
  matches: (ctx) => true,
  decode: (ctx) => {
    const store = { entry: { templates: {} } };
    // Store ALL templates encountered, verbatim params.
    for(const t of ctx.templates){
      if(!store.entry.templates[t.name]) store.entry.templates[t.name] = [];
      store.entry.templates[t.name].push({ params: t.params, raw: t.raw });
    }
    return store;
  }
});

/** --- Headword templates (pure extraction; no inference) --- **/
registry.register({
  id: "ipa",
  matches: (ctx) => ctx.templates.some(t=>t.name==="IPA"),
  decode: (ctx) => {
    // IPA is usually like {{IPA|el|/.../}}
    const t = ctx.templates.find(t=>t.name==="IPA");
    const pos = t?.params?.positional ?? [];
    const ipa = pos.find(x=>x.startsWith("/")) ?? null;
    if(!ipa) return {};
    return { entry: { pronunciation: { IPA: ipa } } };
  }
});

registry.register({
  id: "hyphenation",
  matches: (ctx) => ctx.lines.some(l=>l.trim().startsWith("{{hyphenation|")),
  decode: (ctx) => {
    // Keep raw line; also parse simple positional
    const line = ctx.lines.find(l=>l.trim().startsWith("{{hyphenation|"));
    const tpls = parseTemplates(line);
    const t = tpls.find(x=>x.name==="hyphenation");
    if(!t) return { entry: { hyphenation: { raw: line.trim() } } };
    const sylls = (t.params.positional || []).filter(Boolean);
    if(sylls.length===0) return { entry: { hyphenation: { raw: line.trim() } } };
    return { entry: { hyphenation: { syllables: sylls, raw: line.trim() } } };
  }
});

registry.register({
  id: "el-adj-head",
  matches: (ctx) => ctx.templates.some(t=>t.name==="el-adj"),
  decode: (ctx) => ({ entry: { part_of_speech: "adjective" } })
});

registry.register({
  id: "el-noun-head",
  matches: (ctx) => ctx.templates.some(t=>t.name==="el-noun"),
  decode: (ctx) => ({ entry: { part_of_speech: "noun" } })
});

registry.register({
  id: "el-verb-head",
  matches: (ctx) => ctx.templates.some(t=>t.name==="el-verb"),
  decode: (ctx) => ({ entry: { part_of_speech: "verb" } })
});

registry.register({
  id: "el-pron-head",
  matches: (ctx) => ctx.templates.some(t=>t.name==="el-pron"),
  decode: (ctx) => ({ entry: { part_of_speech: "pronoun" } })
});

registry.register({
  id: "el-numeral-head",
  matches: (ctx) => ctx.templates.some(t=>t.name==="el-numeral"),
  decode: (ctx) => ({ entry: { part_of_speech: "numeral" } })
});

registry.register({
  id: "el-participle-head",
  matches: (ctx) => ctx.templates.some(t=>t.name==="el-part"),
  decode: (ctx) => ({ entry: { part_of_speech: "participle" } })
});

registry.register({
  id: "el-adv-head",
  matches: (ctx) => ctx.templates.some(t=>t.name==="el-adv"),
  decode: (ctx) => ({ entry: { part_of_speech: "adverb" } })
});

registry.register({
  id: "el-art-head",
  matches: (ctx) => ctx.templates.some(t=>t.name==="el-art" || t.name==="el-art-def" || t.name==="el-art-indef"),
  decode: (ctx) => ({ entry: { part_of_speech: "article" } })
});

/** --- Form-of / lemma resolution triggers (explicit only) --- **/
const FORM_OF_TEMPLATES = new Set([
  "infl of",
  "inflection of",
  "alternative form of",
  "alt form",
  "alt form of",
  "form of",
  "misspelling of",
  "abbreviation of",
  "short for",
  "clipping of",
  "diminutive of",
  "augmentative of"
]);

registry.register({
  id: "form-of",
  matches: (ctx) => ctx.templates.some(t=>FORM_OF_TEMPLATES.has(t.name)),
  decode: (ctx) => {
    const t = ctx.templates.find(t=>FORM_OF_TEMPLATES.has(t.name));
    const pos = t?.params?.positional ?? [];
    // typical: {{infl of|el|γράφω||aor|ind|act|3|s}}
    const lang = pos[0] ?? ctx.lang;
    const lemma = pos[1] ?? null;
    const tags = pos.slice(2).filter(Boolean);
    const named = t?.params?.named ?? {};
    const out = { entry: { type: "INFLECTED_FORM", form_of: { template: t.name, lemma, lang, tags, named } } };
    return out;
  }
});

/** --- Translation parsing (explicit template-based; no inference) --- **/
function parseTranslationsFromBlock(wikitext){
  // We parse lines containing {{t}}/{{t+}}/{{tt}} etc.
  const lines = wikitext.split("\n");
  const out = {};
  let currentSense = null;
  for(const line of lines){
    const senseM = line.match(/^\*\s*\(([^)]+)\)\s*:/); // sometimes "* (sense) :"
    if(senseM) currentSense = senseM[1].trim();
    if(!line.includes("{{t") && !line.includes("{{tt")) continue;

    const tpls = parseTemplates(line);
    for(const t of tpls){
      if(!(t.name==="t" || t.name==="t+" || t.name==="t-simple" || t.name==="tt" || t.name==="tt+")) continue;
      const pos = t.params.positional || [];
      const lang = pos[0];
      const gloss = pos[1];
      if(!lang || !gloss) continue;
      if(!out[lang]) out[lang] = [];
      out[lang].push({ gloss, sense: currentSense || null, template: t.name, raw: t.raw, params: t.params });
    }
  }
  return out;
}

registry.register({
  id: "translations",
  matches: (ctx) => ctx.posBlockWikitext.includes("==Translations=="),
  decode: (ctx) => {
    // Extract translation section block (within this pos block only)
    const parts = ctx.posBlockWikitext.split("\n");
    let inTr=false;
    const buf=[];
    for(const line of parts){
      if(line.match(/^====\s*Translations\s*====\s*$/)) { inTr=true; continue; }
      if(inTr && line.match(/^====\s*[^=]/)) { break; }
      if(inTr) buf.push(line);
    }
    if(buf.length===0) return {};
    const tr = parseTranslationsFromBlock(buf.join("\n"));
    if(Object.keys(tr).length===0) return {};
    return { entry: { translations: tr } };
  }
});

/** -------------------- Lemma Resolution & Entry Assembly -------------------- **/

function guessEntryTypeFromTemplates(templates){
  // No heuristics beyond explicit form-of template presence.
  for(const t of templates){
    if(FORM_OF_TEMPLATES.has(t.name)) return "INFLECTED_FORM";
  }
  return "LEXEME";
}

function preferredPosSortKey(pos, pref){
  if(!pref) return 100;
  return pos === pref ? 0 : 50;
}

async function buildEntriesForQuery({query, lang, preferredPos, enrich}){
  // Step 1: fetch query page
  const qPage = await fetchWikitextEnWiktionary(query);
  if(!qPage.exists){
    return { rawLanguageBlock: "", entries: [], notes: [`No page found for ${query} on en.wiktionary.org (after redirects).`] };
  }
  const languageName = langToLanguageName(lang);
  const langBlock = extractLanguageSection(qPage.wikitext, languageName);
  if(!langBlock){
    return { rawLanguageBlock: "", entries: [], notes: [`No ${languageName} section found on en.wiktionary.org for ${qPage.title}.`] };
  }

  // Step 2: split into etymology and pos blocks
  const etyms = splitEtymologiesAndPOS(langBlock);

  // Step 3: decode each pos block to entry
  let entries = [];
  for(const e of etyms){
    for(const pb of e.posBlocks){
      const templates = parseTemplates(pb.wikitext);
      const lines = pb.wikitext.split("\n");
      const entryType = guessEntryTypeFromTemplates(templates);
      const base = makeBaseEntry({
        query, lang,
        wiktTitle: qPage.title,
        etymIdx: e.idx,
        posHeading: pb.posHeading,
        entryType
      });

      // Provide decoder context
      const ctx = {
        lang, query,
        page: qPage,
        languageBlock: langBlock,
        etymology: e,
        posBlock: pb,
        posBlockWikitext: pb.wikitext,
        templates,
        lines
      };
      const patch = registry.decodeAll(ctx);

      // Merge
      deepMerge(base, patch);

      // Basic PoS resolution: if headword templates exist, set part_of_speech from them
      // Otherwise keep null; no inference.
      if(!base.entry.part_of_speech){
        // try from heading as controlled mapping
        const mapped = mapHeadingToPos(pb.posHeading);
        if(mapped) base.entry.part_of_speech = mapped;
      }

      // Normalize entry.form to queried page title (not heading)
      base.entry.form = qPage.title;
      entries.push(base.entry);
    }
  }

  // Step 4: lemma resolution for INFLECTED_FORM entries (explicit)
  const lemmaRequests = [];
  for(const ent of entries){
    const lemma = ent.form_of?.lemma;
    const lemmaLang = ent.form_of?.lang ?? lang;
    if(ent.type==="INFLECTED_FORM" && lemma && lemmaLang===lang){
      lemmaRequests.push(lemma);
    }
  }
  const uniqueLemmas = uniq(lemmaRequests);

  const lemmaEntries = [];
  for(const lemma of uniqueLemmas){
    const res = await buildEntriesForQuery({ query: lemma, lang, preferredPos, enrich });
    // pick lemma entries (LEXEME) and prefer user PoS
    let cands = res.entries.filter(e=>e.type==="LEXEME");
    cands.sort((a,b)=>preferredPosSortKey(a.part_of_speech, preferredPos) - preferredPosSortKey(b.part_of_speech, preferredPos));
    if(cands[0]) lemmaEntries.push(cands[0]);
  }

  // Step 5: Wikidata enrichment (lemma-only; explicit QID only)
  if(enrich){
    for(const ent of entries){
      if(ent.type!=="LEXEME") continue;
      const qid = qPage.pageprops?.wikibase_item;
      if(!qid) continue;
      ent.wikidata = { qid };
      try{
        const wd = await fetchWikidataEntity(qid);
        if(wd){
          ent.wikidata.labels = wd.labels || {};
          ent.wikidata.descriptions = wd.descriptions || {};
          ent.wikidata.sitelinks = wd.sitelinks || {};
          // P18 images
          const p18 = wd.claims?.P18;
          if(Array.isArray(p18) && p18[0]?.mainsnak?.datavalue?.value){
            const filename = p18[0].mainsnak.datavalue.value;
            ent.wikidata.media = { P18: filename, commons_file: `File:${filename}` };
            ent.wikidata.media.thumbnail = commonsThumbUrl(filename, 420);
          }
        }
      }catch(err){
        ent.wikidata_error = String(err?.message || err);
      }
    }
  }

  // Step 6: multi-PoS + lemma-resolution engine: expose both query entries and resolved lemma entry (if any)
  // For a lemma query, lemmaEntries will be empty.
  const merged = entries.concat(lemmaEntries.map(le => ({...le, resolved_for_query: query })));

  // Preferred lemma PoS resolution for direct lemma query with multiple PoS:
  // keep all, but mark the preferred.
  if(preferredPos){
    for(const ent of merged){
      if(ent.type==="LEXEME" && ent.part_of_speech===preferredPos) ent.preferred = true;
    }
  }

  return { rawLanguageBlock: langBlock, entries: merged, notes: [] };
}

function mapHeadingToPos(heading){
  const h = (heading||"").toLowerCase();
  const map = {
    "verb": "verb",
    "noun": "noun",
    "adjective": "adjective",
    "pronoun": "pronoun",
    "numeral": "numeral",
    "adverb": "adverb",
    "article": "article",
    "participle": "participle",
    "preposition": "preposition",
    "conjunction": "conjunction",
    "particle": "particle",
    "proper noun": "proper_noun",
    "suffix": "suffix",
    "prefix": "prefix",
    "interfix": "interfix",
    "phrase": "phrase",
    "determiner": "determiner"
  };
  return map[h] || null;
}

/** -------------------- Commons thumbnail -------------------- **/

function commonsThumbUrl(filename, width){
  // commons Special:FilePath supports redirect to raw, but thumbs are trickier.
  // We use Special:FilePath for the base and let the browser redirect; for consistent thumbs, use upload.wikimedia thumbnail algorithm (needs MD5).
  // Here we do the MD5 method client-side.
  const normalized = filename.replace(/^File:/i,"").replaceAll(" ","_");
  const md5 = md5hex(normalized);
  const a = md5.slice(0,1), b = md5.slice(0,2);
  return `https://upload.wikimedia.org/wikipedia/commons/thumb/${a}/${b}/${encodeURIComponent(normalized)}/${width}px-${encodeURIComponent(normalized)}`;
}

/** Minimal MD5 (tiny implementation) */
function md5hex(str){
  // Adapted minimal md5 for demo use; not security.
  function cmn(q, a, b, x, s, t) { a = add32(add32(a, q), add32(x, t)); return add32((a << s) | (a >>> (32 - s)), b); }
  function ff(a, b, c, d, x, s, t) { return cmn((b & c) | ((~b) & d), a, b, x, s, t); }
  function gg(a, b, c, d, x, s, t) { return cmn((b & d) | (c & (~d)), a, b, x, s, t); }

    for (let i = 0; i < 64; i += 4) {

  function md51(s) {
    let n = s.length, state = [1732584193, -271733879, -1732584194, 271733878], i;
    for (i = 64; i <= n; i += 64) md5cycle(state, md5blk(s.substring(i - 64, i)));
    s = s.substring(i - 64);
    const tail = Array(16).fill(0);
    for (i = 0; i < s.length; i++) tail[i >> 2] |= s.charCodeAt(i) << ((i % 4) << 3);
    tail[i >> 2] |= 0x80 << ((i % 4) << 3);

/** -------------------- YAML Rendering (compact + highlight) -------------------- **/

function toYaml(obj, indent=0){
  const sp = "  ".repeat(indent);
  if(obj === null) return "null";
  if(typeof obj === "string"){
    // quote only when needed
    if(obj === "" || /[:\n\r\t\[\]\{\},#&*!|>'"%@`]/.test(obj) || obj.startsWith(" ") || obj.endsWith(" ")){
      return JSON.stringify(obj);
    }
    return obj;
  }
  if(typeof obj === "number" || typeof obj === "boolean") return String(obj);
  if(Array.isArray(obj)){
    if(obj.length===0) return "[]";
    return obj.map(v => `${sp}- ${toYaml(v, indent+1).replace(/^\s+/, "")}`).join("\n");
  }
  const keys = Object.keys(obj);
  if(keys.length===0) return "{}";
  let out = "";
  for(const k of keys){
    const v = obj[k];
    if(v && typeof v === "object" && !Array.isArray(v)){
      out += `${sp}${k}:\n${toYaml(v, indent+1)}\n`;
    }else if(Array.isArray(v)){
      if(v.length===0) out += `${sp}${k}: []\n`;
      else{
        out += `${sp}${k}:\n`;
        out += v.map(item => `${sp}  - ${toYaml(item, indent+2).replace(/^\s+/, "")}`).join("\n") + "\n";
      }
    }else{
      out += `${sp}${k}: ${toYaml(v, indent+1)}\n`;
    }
  }
  return out.trimEnd();
}

function highlightYaml(yaml){
  // Minimal regex-based highlighter: keys, strings, numbers, booleans, comments.
  const esc = escapeHtml(yaml);
  const lines = esc.split("\n").map(line=>{
    // comments
    line = line.replace(/(#.*)$/g, '<span class="c">$1</span>');
    // keys (start or after spaces): key:
    line = line.replace(/^(\s*)([A-Za-z0-9_\-]+)(:)/g, '$1<span class="k">$2</span><span class="p">$3</span>');
    // strings in quotes
    line = line.replace(/"([^"\\]*(\\.[^"\\]*)*)"/g, '<span class="s">"$1"</span>');
    // booleans/null
    line = line.replace(/\b(true|false|null)\b/g, '<span class="t">$1</span>');
    // numbers
    line = line.replace(/\b(-?\d+(\.\d+)?)\b/g, '<span class="n">$1</span>');
    return line;
  });
  return lines.join("\n");
}

/** -------------------- Template Coverage Enumeration (API-driven) -------------------- **/

async function listCategoryMembers(categoryTitle){
  const origin = "https://en.wiktionary.org/w/api.php";
  let cmcontinue = null;
  const members = [];
  while(true){
    const params = {
      action: "query",
      format: "json",
      formatversion: "2",
      origin: "*",
      list: "categorymembers",
      cmtitle: categoryTitle,
      cmlimit: "max"
    };
    if(cmcontinue) params.cmcontinue = cmcontinue;
    const j = await mwFetchJson(origin, params);
    const batch = j?.query?.categorymembers ?? [];
    for(const m of batch) members.push(m.title);
    cmcontinue = j?.continue?.cmcontinue;
    if(!cmcontinue) break;
    // be polite
    await sleep(60);
  }
  return members;
}

/** -------------------- UI Wiring -------------------- **/

const rawEl = document.getElementById("raw");
const yamlEl = document.getElementById("yaml");
const imgsEl = document.getElementById("imgs");
const statusLeft = document.getElementById("statusLeft");
const statusRight = document.getElementById("statusRight");

async function run(){
  const query = document.getElementById("q").value.trim();
  const lang = document.getElementById("lang").value;
  const preferredPos = document.getElementById("prefpos").value || "";
  const enrich = document.getElementById("enrich").checked;

  statusLeft.textContent = "Fetching…";
  statusRight.textContent = "Parsing…";
  rawEl.textContent = "";
  yamlEl.innerHTML = "";
  imgsEl.style.display = "none";
  imgsEl.innerHTML = "";

  try{
    const res = await buildEntriesForQuery({ query, lang, preferredPos, enrich });
    rawEl.textContent = res.rawLanguageBlock || "";
    statusLeft.textContent = res.rawLanguageBlock ? `OK: extracted ${langToLanguageName(lang)} block from en.wiktionary.org` : (res.notes.join(" ") || "No language block.");

    // Right: YAML
    const payload = { query, lang, entries: res.entries, notes: res.notes };
    const yaml = toYaml(payload);
    yamlEl.innerHTML = highlightYaml(yaml);

    // Images: collect Wikidata thumbnails
    const thumbs = [];
    for(const e of res.entries){
      const t = e.wikidata?.media?.thumbnail;
      if(t) thumbs.push({ url: t, qid: e.wikidata.qid, title: e.form });
    }
    if(thumbs.length){
      imgsEl.style.display = "flex";
      imgsEl.innerHTML = thumbs.map(x=>`
        <div class="imgcard">
          <img src="${x.url}" alt="Wikidata image"/>
          <div class="cap">${escapeHtml(x.title)} • ${escapeHtml(x.qid)}</div>
        </div>
      `).join("");
    }

    statusRight.textContent = `OK: ${res.entries.length} normalized entries (template-faithful).`;
  }catch(err){
    const msg = String(err?.message || err);
    statusLeft.textContent = "Error";
    statusRight.textContent = "Error";
    rawEl.textContent = msg;
    yamlEl.innerHTML = highlightYaml(`error: ${JSON.stringify(msg)}\n`);
  }
}

document.getElementById("go").addEventListener("click", run);
document.getElementById("q").addEventListener("keydown", (e)=>{ if(e.key==="Enter") run(); });

run();
</script>
